name: Verify Commit Author

on:
  push:
    branches:
      - main

# Solution préconisée par GitHub pour la dépréciation de Node.js 20
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Utilisation de la version majeure v4 selon les bonnes pratiques de versionnage
        # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#example-using-versioned-actions
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Author Email
        run: |
          # Email autorisé pour ce dépôt
          ALLOWED_EMAIL="contact@kevinpaulidor.de"
          
          # Détermination de la plage de commits (push simple ou premier push)
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD^..HEAD"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi

          echo "Vérification de l'historique : $RANGE"
          
          # Extraction des emails uniques des auteurs
          AUTHORS=$(git log $RANGE --pretty=format:'%ae' | sort -u)
          
          for EMAIL in $AUTHORS; do
            echo "Vérification de l'auteur : $EMAIL"
            if [ "$EMAIL" != "$ALLOWED_EMAIL" ]; then
              echo "--------------------------------------------------------"
              echo "ERREUR : Commit détecté avec l'auteur $EMAIL."
              echo "Seul $ALLOWED_EMAIL est autorisé."
              echo "--------------------------------------------------------"
              exit 1
            fi
          done
          
          echo "Succès : Validation de l'auteur réussie."